syntax = "proto3";

package otherfee.v1;

import "otherfee/v1/other_fee_domain.proto";

option go_package = "github.com/itsLeonB/billsplittr-protos/gen/go/otherfee/v1;otherfee";

message AddRequest {
  string profile_id = 1;
  string group_expense_id = 2;
  OtherFee other_fee = 3;
}

message AddResponse {
  OtherFeeResponse other_fee = 1;
}

message UpdateRequest {
  string profile_id = 1;
  string id = 2;
  string group_expense_id = 3;
  OtherFee other_fee = 4;
}

message UpdateResponse {
  OtherFeeResponse other_fee = 1;
}

message RemoveRequest {
  string profile_id = 1;
  string id = 2;
  string group_expense_id = 3;
}

message GetCalculationMethodsResponse {
  repeated FeeCalculationMethodInfo methods = 1;
}
