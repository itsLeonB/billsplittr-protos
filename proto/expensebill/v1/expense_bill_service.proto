syntax = "proto3";

package expensebill.v1;

import "expensebill/v1/expense_bill_message.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/itsLeonB/billsplittr-protos/gen/go/expensebill/v1;expensebill";

service ExpenseBillService {
  rpc Save(stream SaveRequest) returns (SaveResponse);
  rpc GetAllCreated(GetAllCreatedRequest) returns (GetAllCreatedResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (google.protobuf.Empty);
}
