syntax = "proto3";

package expensebill.v1;

import "audit/v1/metadata.proto";

option go_package = "github.com/itsLeonB/billsplittr-protos/gen/go/expensebill/v1;expensebill";

message ExpenseBill {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_PENDING = 1;
    STATUS_PARSED = 2;
    STATUS_FAILED = 3;
  }

  string creator_profile_id = 1;
  string payer_profile_id = 2;
  string object_key = 3;
  string group_expense_id = 4;
  Status status = 5;
}

message ExpenseBillResponse {
  ExpenseBill expense_bill = 1;
  audit.v1.Metadata audit_metadata = 2;
}
