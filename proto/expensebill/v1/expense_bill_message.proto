syntax = "proto3";

package expensebill.v1;

import "expensebill/v1/expense_bill_domain.proto";

option go_package = "github.com/itsLeonB/billsplittr-protos/gen/go/expensebill/v1;expensebill";

message SaveRequest {
  ExpenseBill expense_bill = 1;
}

message SaveResponse {
  ExpenseBillResponse expense_bill = 1;
}

message GetAllCreatedRequest {
  string creator_profile_id = 1;
}

message GetAllCreatedResponse {
  repeated ExpenseBillResponse expense_bills = 1;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  ExpenseBillResponse expense_bill = 1;
}

message DeleteRequest {
  string id = 1;
}
