syntax = "proto3";

package expensebill.v1;

option go_package = "github.com/itsLeonB/billsplittr-protos/expensebill/v1;expensebill";

message UploadStreamRequest {
  oneof data {
    BillMetadata bill_metadata = 1;
    bytes chunk = 2;
  }
}

message BillMetadata {
  string payer_profile_id = 1;
  string creator_profile_id = 2;
  string content_type = 3;
  string filename = 4;
  int64 file_size = 5;
}
