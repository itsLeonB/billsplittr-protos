syntax = "proto3";

package domain.v1;

import "domain/v1/domain.proto";
import "domain/v1/expense_item.proto";
import "domain/v1/other_fee.proto";
import "google/type/money.proto";

option go_package = "github.com/itsLeonB/billsplittr-protos/gen/go/domain/v1;domain";

message GroupExpenseResponse {
  string payer_profile_id = 1;
  google.type.Money total_amount = 2;
  string description = 3;
  string creator_profile_id = 4;
  bool is_confirmed = 5;
  bool is_participants_confirmed = 6;
  repeated ExpenseItemResponse items = 7;
  repeated OtherFeeResponse other_fees = 8;
  repeated ExpenseParticipantResponse participants = 9;
  AuditMetadata audit_metadata = 10;
}

message ExpenseParticipantResponse {
  string profile_id = 1;
  google.type.Money share_amount = 2;
}
