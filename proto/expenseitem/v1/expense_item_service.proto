syntax = "proto3";

package expenseitem.v1;

import "expenseitem/v1/expense_item_message.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/itsLeonB/billsplittr-protos/expenseitem/v1;expenseitem";

service ExpenseItemService {
  rpc Add(AddRequest) returns (AddResponse);
  rpc GetDetails(GetDetailsRequest) returns (GetDetailsResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Remove(RemoveRequest) returns (google.protobuf.Empty);
}
