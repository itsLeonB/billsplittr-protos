syntax = "proto3";

package groupexpense.v1;

import "audit/v1/metadata.proto";
import "expenseitem/v1/expense_item_domain.proto";
import "google/type/money.proto";
import "otherfee/v1/other_fee_domain.proto";

option go_package = "github.com/itsLeonB/billsplittr-protos/gen/go/groupexpense/v1;groupexpense";

message GroupExpenseResponse {
  string payer_profile_id = 1;
  google.type.Money total_amount = 2;
  google.type.Money subtotal = 3;
  string description = 4;
  string creator_profile_id = 5;
  bool is_confirmed = 6;
  bool is_participants_confirmed = 7;
  repeated expenseitem.v1.ExpenseItemResponse items = 8;
  repeated otherfee.v1.OtherFeeResponse other_fees = 9;
  repeated ExpenseParticipantResponse participants = 10;
  audit.v1.Metadata audit_metadata = 11;
}

message ExpenseParticipantResponse {
  string profile_id = 1;
  google.type.Money share_amount = 2;
}
