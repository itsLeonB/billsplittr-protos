syntax = "proto3";

package groupexpense.v1;

import "google/protobuf/empty.proto";
import "groupexpense/v1/group_expense_message.proto";

option go_package = "github.com/itsLeonB/billsplittr-protos/gen/go/groupexpense/v1;groupexpense";

service GroupExpenseService {
  rpc CreateDraft(CreateDraftRequest) returns (CreateDraftResponse);
  rpc GetAllCreated(GetAllCreatedRequest) returns (GetAllCreatedResponse);
  rpc GetDetails(GetDetailsRequest) returns (GetDetailsResponse);
  rpc ConfirmDraft(ConfirmDraftRequest) returns (ConfirmDraftResponse);
  rpc Delete(DeleteRequest) returns (google.protobuf.Empty);
  rpc SyncParticipants(SyncParticipantsRequest) returns (google.protobuf.Empty);
}
